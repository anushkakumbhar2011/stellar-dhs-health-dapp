name: CD Pipeline

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deployment Ready Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

      - name: Deployment Ready
        run: echo "Application is ready for deployment"
