# =============================================================================
# CI — DHS Build & Validation
# =============================================================================
# Purpose: Continuous Integration workflow for DHS (Decentralized Health System)
# Triggers: Every push and pull request targeting the main branch
# Expected Success: Both frontend and contract builds complete without errors
# Reviewer Notes: Parallel execution of frontend (React+Vite) and contract (Rust+Soroban)
# =============================================================================

name: CI — DHS Build & Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same branch to save resources
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache Node Modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install Dependencies
        run: npm ci

      - name: Build Frontend Production Bundle
        run: npm run build

      - name: Verify Build Output
        run: |
          if [ ! -d "dist" ]; then
            echo "❌ Build failed: dist directory not found"
            exit 1
          fi
          echo "✅ Frontend build successful"

  contract-build:
    name: Contract Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown
          override: true
          profile: minimal

      - name: Cache Cargo Registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('contracts/dhs-health-records/Cargo.lock') }}

      - name: Cache Cargo Index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('contracts/dhs-health-records/Cargo.lock') }}

      - name: Cache Cargo Build
        uses: actions/cache@v4
        with:
          path: contracts/dhs-health-records/target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('contracts/dhs-health-records/Cargo.lock') }}

      - name: Build Soroban Smart Contract
        working-directory: contracts/dhs-health-records
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Verify WASM Output
        working-directory: contracts/dhs-health-records
        run: |
          if [ ! -f "target/wasm32-unknown-unknown/release/dhs_health_records.wasm" ]; then
            echo "❌ Contract build failed: WASM file not found"
            exit 1
          fi
          echo "✅ Contract build successful"
          ls -lh target/wasm32-unknown-unknown/release/*.wasm
